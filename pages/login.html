<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <meta
      name="description"
      content="Acesse sua conta na TechShop para acompanhar pedidos, favoritos e ofertas exclusivas."
    />

    <title>Login | TechShop</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- CSS principal do projeto -->
    <link rel="stylesheet" href="../css/main.css" />

    <!-- CSS específico da página de autenticação -->
    <link rel="stylesheet" href="../css/components/auth.css" />
  </head>

  <body>
    <header class="header">
      <div class="header__container">
        <a
          href="./index.html"
          class="header__logo"
          aria-label="Voltar para a página inicial da TechShop"
        >
          <svg
            class="header__logo-icon"
            width="40"
            height="40"
            viewBox="0 0 40 40"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <rect width="40" height="40" rx="8" fill="#ff6b35" />
            <path
              d="M12 20L18 26L29 14"
              stroke="white"
              stroke-width="4"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>

          <span>TechShop</span>
        </a>

        <nav class="header__nav" aria-label="Navegação principal">
          <ul class="header__menu">
            <li>
              <a href="./index.html" class="header__menu-link">Home</a>
            </li>

            <li>
              <a href="./products.html" class="header__menu-link">Produtos</a>
            </li>

            <li>
              <a href="./products.html#offers" class="header__menu-link">Ofertas</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="auth-page">
      <section class="auth-section" aria-labelledby="login-title">
        <div class="auth-card">
          <div class="auth-card__header">
            <span class="auth-card__badge">Área do cliente</span>

            <h1 id="login-title">Entrar na sua conta</h1>

            <p>
              Acesse para acompanhar seus pedidos, salvar favoritos e aproveitar ofertas exclusivas.
            </p>
          </div>

          <form class="auth-form" action="#" method="post">
            <div class="auth-form__group">
              <label for="email">
                E-mail
              </label>

              <input
                type="email"
                id="email"
                name="email"
                placeholder="seunome@email.com"
                autocomplete="email"
                required
              />
            </div>

            <div class="auth-form__group">
              <label for="password">
                Senha
              </label>

              <input
                type="password"
                id="password"
                name="password"
                placeholder="Digite sua senha"
                autocomplete="current-password"
                required
              />
            </div>

            <div class="auth-form__options">
              <label class="auth-form__remember">
                <input type="checkbox" name="remember" />

                <span>Lembrar acesso</span>
              </label>

              <a href="#" class="auth-link">
                Esqueci minha senha
              </a>
            </div>

            <button type="submit" class="auth-form__button">
              Entrar
            </button>
          </form>

          <div class="auth-card__footer">
            <p>
              Ainda não tem uma conta?
              <a href="./register.html" class="auth-link">
                Criar conta
              </a>
            </p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
